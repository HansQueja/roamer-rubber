test_images_dir: "/content/roamer-rubber/Unified_Dataset"

data:
  dataset: "/content/roamer-rubber/Unified_Dataset"  # <-- Point to the RAW unsegmented images
  seed: 42
  image_size: 224
  batch_size: 32
  num_workers: 2

class_names:
  - Algal_Spot
  - Anthracnose
  - Dry_Leaf
  - Healthy
  - Leaf_Spot
  - Powdery_Mildew

yolo:
  fp32_path: "checkpoints/yolo_best.pt"
  onnx_path: "checkpoints/yolo_best.onnx"
  conf_threshold: 0.10

models:
  - name: "BaselineCNN (Raw Images)"
    checkpoint: "checkpoints/best_baseline_cnn.pth"
    architecture: BaselineCNN
    use_yolo: false
    quantize_yolo: false

  - name: "BaselineCNN + YOLO FP32"
    checkpoint: "checkpoints/best_baseline_cnn.pth"
    architecture: BaselineCNN
    use_yolo: true
    quantize_yolo: false

  - name: "BaselineCNN + YOLO FP16"
    checkpoint: "checkpoints/best_baseline_cnn.pth"
    architecture: BaselineCNN
    use_yolo: true
    quantize_yolo: true

  - name: "DeepEnhancedCNN_SE + YOLO FP32"             # <-- Updated to your optimized attention model
    checkpoint: "checkpoints/best_deepenhanced_cnn.pth"
    architecture: DeepEnhancedCNN
    use_yolo: true
    quantize_yolo: false

  - name: "DeepEnhancedCNN_SE + YOLO FP16"             # <-- Your core custom edge architecture
    checkpoint: "checkpoints/best_deepenhanced_cnn.pth"
    architecture: DeepEnhancedCNN
    use_yolo: true
    quantize_yolo: true

  - name: "MobileNetEdge (Raw Images)"
    checkpoint: "checkpoints/best_mobilenet.pth"
    architecture: MobileNetEdge
    use_yolo: false
    quantize_yolo: false

  - name: "MobileNetEdge + YOLO FP32"
    checkpoint: "checkpoints/best_mobilenet_yolo.pth"
    architecture: MobileNetEdge
    use_yolo: true
    quantize_yolo: false

  - name: "MobileNetEdge + YOLO FP16"
    checkpoint: "checkpoints/best_mobilenet_yolo.pth"
    architecture: MobileNetEdge
    use_yolo: true
    quantize_yolo: true

  - name: "YOLOv8s Standalone FP32"
    checkpoint: "checkpoints/yolo_best.pt"
    architecture: YOLOStandalone
    use_yolo: false
    quantize_yolo: false