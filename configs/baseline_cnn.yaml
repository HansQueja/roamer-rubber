model:
  name: MobileNetEdge
  num_classes: 6

data:
  dataset: "/content/Unified_Dataset"
  seed: 42
  split:
    train: 0.70
    val:   0.15
    test:  0.15
  image_size: 224
  batch_size: 128
  num_workers: 5

segmentation:
  enabled: false
  model_path: "checkpoints/yolo_best.pt"
  fill: "white"   
  conf_threshold: 0.10
  presegment_output: "Unified_Dataset_Segmented" 

augmentation:
  random_resized_crop:
    scale: [0.6, 1.0]
  horizontal_flip: 0.2
  vertical_flip: 0.2
  rotate_limit: 20
  brightness_contrast: 0.2
  hue_saturation:
    hue_shift_limit: 0
    sat_shift_limit: 0
    val_shift_limit: 0

training:
  epochs: 50
  patience: 10
  learning_rate: 0.001
  scheduler:
    type: CosineAnnealingLR
    T_max: 50       
    eta_min: 0.00001 

paths:
  checkpoint: checkpoints/best_baseline_cnn.pth
  outputs: outputs/