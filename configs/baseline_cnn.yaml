model:
  name: DeepEnhancedCNN
  num_classes: 6

data:
  dataset: "Unified_Dataset_Segmented"
  seed: 42
  split:
    train: 0.70
    val:   0.15
    test:  0.15
  image_size: 224
  batch_size: 64
  num_workers: 2

segmentation:
  enabled: false
  model_path: "checkpoints/yolo_best.pt"
  fill: "white"   
  conf_threshold: 0.10

augmentation:
  random_resized_crop:
    scale: [0.6, 1.0]
  horizontal_flip: 0.3
  vertical_flip: 0.2
  rotate_limit: 20
  brightness_contrast: 0.2
  hue_saturation:
    hue_shift_limit: 0
    sat_shift_limit: 0
    val_shift_limit: 0

training:
  epochs: 50
  patience: 10
  learning_rate: 0.001
  scheduler:
    type: CosineAnnealingLR
    T_max: 50       
    eta_min: 0.00001 

paths:
  checkpoint: checkpoints/best_deepenhanced_cnn.pth
  outputs: outputs/